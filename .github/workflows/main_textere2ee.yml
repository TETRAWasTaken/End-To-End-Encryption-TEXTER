name: Build and deploy Python app to Azure Web App - TEXTERE2EE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ----------------------------------------------------------------
      # 🧹 CLEANUP STEP (Since files are already at root)
      # ----------------------------------------------------------------
      - name: Prepare Server Build
        run: |
          echo "Files at root before cleanup:"
          ls -la

          # 1. Remove Client Code & Legacy Files (to keep server light)
          echo "Removing Client folders..."
          rm -rf Client
          rm -rf "Legacy Server"
          rm -f run_client.py

          # 2. Generate Server-Only Requirements
          # Since your repo's requirements.txt has Client libs (PySide6), 
          # we overwrite it with ONLY the server dependencies.
          echo "Generating server-only requirements.txt..."
          cat > requirements.txt <<EOF
          uvicorn==0.38.0
          websockets==15.0.1
          psycopg2-binary==2.9.10
          cryptography==46.0.3
          argon2-cffi==25.1.0
          argon2-cffi-bindings==25.1.0
          fastapi
          PyJWT
          EOF
          
          # 3. Build Rust Auth Server
          echo "Building Rust Auth Server..."
          cd AuthServer
          cargo build --release
          # Find the compiled binary and copy it to the root
          EXEC_NAME=$(find target/release -maxdepth 1 -type f -executable -not -name "*.so" -not -name "*.d" | head -n 1)
          cp "$EXEC_NAME" ../auth_server_bin
          cd ..

          # 4. Create Startup Script
          echo "Generating startup.sh..."
          cat > startup.sh <<'EOF'
          #!/bin/bash
          echo "Starting Auth Server in the background on port 8080..."
          PORT=8080 ./auth_server_bin &
          
          echo "Starting Python WebSocket Server..."
          python -m uvicorn Server.secure_asgi_server:app --host 0.0.0.0 --port ${WEBSITES_PORT:-8000}
          EOF
          chmod +x startup.sh

          echo "--- Final Deployment Package ---"
          ls -la

      # 🛠️ Optional: Install dependencies to verify they work
      - name: Verify Server Dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/
            !.git/
            !.github/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6905E0C4072E4AD581877834258A075F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_356BC32969A64D4A85EA4268ADC66501 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_08C616287B724326BA26C8256C863DCB }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'TEXTERE2EE'
          slot-name: 'Production'
          package: '.' # Deploys the current directory (root)